name: Feature Request
description: 新機能や改善を提案する
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        提案ありがとうございます。背景と解決したい課題を具体的に記入してください。

  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題
      description: 現状の何が問題か、なぜこの機能が必要かを説明してください
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 提案する解決策
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案

  - type: dropdown
    id: priority
    attributes:
      label: 優先度
      options:
        - High（本番影響あり）
        - Medium（影響はあるが緊急ではない）
        - Low（あると嬉しい）
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 補足情報
      description: 関連するコード箇所、参考リンクなど
