name: Bug Report
description: UIの不具合を報告する
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        バグ報告ありがとうございます。再現に必要な情報をできるだけ詳しく記入してください。

  - type: dropdown
    id: environment
    attributes:
      label: 環境
      options:
        - Production (Vercel)
        - Development (localhost:3001)
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: ブラウザ / OS
      placeholder: "例: Chrome 124 / macOS 14"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 実際の動作
      description: コンソールエラーやスクリーンショットがあれば貼り付けてください
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 補足情報
